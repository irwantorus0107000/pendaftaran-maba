<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Pendaftaran Mahasiswa Baru</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>INPUT PENDAFTARAN</h2>
    
    <div class="info-jumlah">
        <strong>JUMLAH INPUT DATA: <span id="jumlahInput">0</span></strong>
    </div>

    <form id="formDaftar">
        <table class="form-table">
            <tr>
                <td><label>KODE PENDAFTARAN</label></td>
                <td><input type="text" id="kodePendaftaran" placeholder="A2-101-9" readonly></td>
            </tr>
            <tr>
                <td><label>NAMA PENDAFTAR</label></td>
                <td><input type="text" id="nama" required></td>
            </tr>
            <tr>
                <td><label>JENIS KELAMIN</label></td>
                <td>
                    <input type="radio" name="jk" id="jkLaki" value="Laki-laki" required>
                    <label for="jkLaki">LAKI-LAKI</label>
                    &nbsp;&nbsp;
                    <input type="radio" name="jk" id="jkPerempuan" value="Perempuan">
                    <label for="jkPerempuan">PEREMPUAN</label>
                </td>
            </tr>
            <tr>
                <td><label>TEMPAT TANGGAL LAHIR</label></td>
                <td>
                    <input type="text" id="tempatLahir" placeholder="Tempat" required style="width: 120px;">
                    <input type="date" id="tanggalLahir" required style="width: 160px;">
                </td>
            </tr>
            <tr>
                <td><label>PEKERJAAN ORANG TUA</label></td>
                <td><input type="text" id="pekerjaanOrtu" required></td>
            </tr>
            <tr>
                <td colspan="2"><strong>NILAI TES</strong></td>
            </tr>
            <tr>
                <td><label>MATEMATIKA</label></td>
                <td><input type="number" id="nilaiMat" min="0" max="100" required></td>
            </tr>
            <tr>
                <td><label>BAHASA INGGRIS</label></td>
                <td><input type="number" id="nilaiInggris" min="0" max="100" required></td>
            </tr>
            <tr>
                <td><label>PENGETAHUAN UMUM</label></td>
                <td><input type="number" id="nilaiUmum" min="0" max="100" required></td>
            </tr>
            <tr>
                <td><label>TEMPAT TES</label></td>
                <td>
                    <select id="tempatTes" required>
                        <option value="">-- Pilih --</option>
                        <option value="A">A - Gedung A</option>
                        <option value="B">B - Gedung B</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>GELOMBANG</label></td>
                <td>
                    <select id="gelombang" required>
                        <option value="">-- Pilih --</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </td>
            </tr>
        </table>
        
        <div class="tombol-form">
            <button type="button" class="btn-simpan" onclick="simpanData()">SIMPAN</button>
            <button type="button" class="btn-reset" onclick="resetForm()">RESET</button>
        </div>
    </form>

    <hr>

    <h2>TABEL DATA</h2>
    <div class="table-wrapper">
        <table id="tabelData">
            <thead>
                <tr>
                    <th>KODE PENDAFTARAN</th>
                    <th>NAMA PENDAFTAR</th>
                    <th>TEMPAT TANGGAL LAHIR</th>
                    <th>JENIS KELAMIN</th>
                    <th>PEKERJAAN ORANG TUA</th>
                    <th>TEMPAT TES</th>
                    <th>MATEMATIKA</th>
                    <th>INGGRIS</th>
                    <th>UMUM</th>
                    <th>RATA-RATA</th>
                    <th>KETERANGAN</th>
                </tr>
            </thead>
            <tbody id="bodyTabel">
            </tbody>
        </table>
    </div>

    <div class="ringkasan">
        <div class="ringkasan-item">
            <strong>JUMLAH PENDAFTAR: <span id="jumlahPendaftar">0</span></strong>
        </div>
        <div class="ringkasan-item">
            <strong>JUMLAH PESERTA LULUS: <span id="jumlahLulus">0</span></strong>
        </div>
        <div class="ringkasan-item">
            <strong>JUMLAH PESERTA TIDAK LULUS: <span id="jumlahTidakLulus">0</span></strong>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
