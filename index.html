<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Mahasiswa Baru</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Form Pendaftaran Mahasiswa Baru</h1>
    <h3>Universitas Pamulang - Teknik Informatika</h3>
    
    <form id="formDaftar">
        <div class="form-group">
            <label>Nama Pendaftar:</label>
            <input type="text" id="nama" required>
        </div>
        
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <div class="radio-group">
                <label><input type="radio" name="jk" value="Laki-laki" required> Laki-laki</label>
                <label><input type="radio" name="jk" value="Perempuan"> Perempuan</label>
            </div>
        </div>
        
        <div class="form-group">
            <label>Tempat Lahir:</label>
            <input type="text" id="tempat_lahir" required>
        </div>
        
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" id="tanggal_lahir" required>
        </div>
        
        <div class="form-group">
            <label>Asal Sekolah:</label>
            <input type="text" id="asal_sekolah" required>
        </div>
        
        <div class="form-group">
            <label>Pekerjaan Ortu:</label>
            <input type="text" id="pekerjaan_ortu" required>
        </div>
        
        <div class="form-group">
            <label>Tempat Tes:</label>
            <select id="tempat_tes" required>
                <option value="">Pilih</option>
                <option value="A">A - Gedung A</option>
                <option value="B">B - Gedung B</option>
                <option value="V">V - Viktor</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Gelombang:</label>
            <select id="gelombang" required>
                <option value="">Pilih</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </div>
        
        <hr>
        <h3>Nilai Tes</h3>
        
        <div class="form-group">
            <label>Matematika:</label>
            <input type="number" id="nilai_mat" min="0" max="100" required>
        </div>
        
        <div class="form-group">
            <label>B. Inggris:</label>
            <input type="number" id="nilai_inggris" min="0" max="100" required>
        </div>
        
        <div class="form-group">
            <label>Pengetahuan Umum:</label>
            <input type="number" id="nilai_umum" min="0" max="100" required>
        </div>
        
        <button type="submit">Daftar</button>
    </form>
    
    <div id="hasil" class="result" style="display: none;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
